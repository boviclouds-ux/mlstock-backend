# ═══════════════════════════════════════════════════════════════════
# default.conf  ·  Virtual Host MLStock  ·  Sécurité + Proxy API
# ═══════════════════════════════════════════════════════════════════

upstream api_backend {
    server api:5000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Limiter les connexions simultanées par IP ─────────────────────
    limit_conn conn_zone 20;

    # ── En-têtes de sécurité HTTP (ajoutés à toutes les réponses) ────
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), usb=()" always;
    # CSP : ajuster 'data: blob:' si vous chargez des images base64 (logo)
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src  'self' 'unsafe-inline'; \
         style-src   'self' 'unsafe-inline'; \
         img-src     'self' data: blob:; \
         connect-src 'self'; \
         font-src    'self'; \
         object-src  'none'; \
         base-uri    'self'; \
         frame-ancestors 'none';" always;

    # ── Bloquer les chemins sensibles ─────────────────────────────────
    # Fichiers de configuration et secrets
    location ~* \.(env|git|htaccess|htpasswd|sh|sql|bak|key|pem|crt|log)$ {
        deny all;
        return 404;
    }
    # Fichiers et répertoires cachés (dot-files)
    location ~ /\. {
        deny all;
        return 404;
    }
    # Répertoires internes du projet (ne doivent jamais être servis)
    location ~* ^/(node_modules|server|seeder|mongo-init|nginx|\.git)/ {
        deny all;
        return 404;
    }

    # ── Bloquer les méthodes HTTP non utilisées par l'application ─────
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ── Route login : rate limiting très strict (anti brute-force) ────
    location = /api/auth/login {
        limit_req zone=login_zone burst=5 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
    }

    # ── Proxy général vers l'API Node.js ─────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "keep-alive";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Masquer les en-têtes révélant la stack interne
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;

        # Taille élargie pour l'endpoint de restauration backup
        client_max_body_size 100m;
    }

    # ── Assets statiques : cache long (immutable, hash Vite) ─────────
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── React SPA : fallback vers index.html pour le routeur côté client
    location / {
        try_files $uri $uri/ /index.html;

        # index.html ne doit pas être mis en cache (toujours la version la plus récente)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
