# ═══════════════════════════════════════════════════════════════════
# nginx.conf  ·  Configuration principale Nginx MLStock
# ═══════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Masquer la version Nginx dans les en-têtes ───────────────────
    server_tokens off;

    # ── Format de log ────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performances ─────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Taille max du corps (upload backup JSON : 100 MB)
    client_max_body_size 100m;
    client_body_timeout  30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────
    # Zone générale API : 10 req/s par IP (burst 20 accepté)
    limit_req_zone  $binary_remote_addr zone=api_zone:10m   rate=10r/s;
    # Zone login renforcée : 3 tentatives/min par IP
    limit_req_zone  $binary_remote_addr zone=login_zone:2m  rate=3r/m;
    # Connexions simultanées max par IP
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # Code de retour en cas de dépassement (429 = Too Many Requests)
    limit_req_status  429;
    limit_conn_status 429;

    # ── Timeouts proxy ────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    30s;

    include /etc/nginx/conf.d/*.conf;
}
